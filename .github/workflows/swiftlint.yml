name: SwiftLint
on:
  pull_request:
    paths:
      - '**/*.swift'

jobs:
  swiftlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install SwiftLint
        run: |
          SWIFTLINT_VERSION=$(curl -s https://api.github.com/repos/realm/SwiftLint/releases/latest | grep '"tag_name"' | cut -d'"' -f4)
          curl -sL "https://github.com/realm/SwiftLint/releases/download/${SWIFTLINT_VERSION}/swiftlint_linux.zip" -o swiftlint.zip
          unzip -o swiftlint.zip swiftlint
          chmod +x swiftlint
          sudo mv swiftlint /usr/local/bin/
      - name: Run SwiftLint
        run: swiftlint --reporter github-actions-logging --strict
